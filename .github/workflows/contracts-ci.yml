# Contracts CI — format check, build, and the full Foundry test suite
# (unit + integration + fuzz + invariant) on every push/PR that touches
# contracts/.
#
# The fork test hits Arbitrum Sepolia's public RPC — a real network
# dependency, so it runs as its own non-blocking step: a public-RPC hiccup
# shouldn't fail CI for a change that has nothing to do with it. Everything
# else is fully local (Foundry's own EVM) and must pass.
name: contracts

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Format check
        # Scoped explicitly — a bare `forge fmt` walks lib/ too and would
        # reformat (or, in --check, potentially misjudge) the vendored
        # openzeppelin-contracts submodule. See plan.md's design rules.
        run: forge fmt --check src test script

      - name: Build
        run: forge build

      - name: Test (unit, integration, fuzz, invariant)
        run: forge test --no-match-path "test/Fork.t.sol" -vvv

      - name: Test (fork — Arbitrum Sepolia, non-blocking)
        continue-on-error: true
        run: forge test --match-path "test/Fork.t.sol" -vvv
